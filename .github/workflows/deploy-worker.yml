name: Deploy Enemy Director Worker

on:
  push:
    branches: ["main"]
    paths:
      - "apps/enemy-director-worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: enemy-director-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Test Worker
        run: corepack pnpm --filter @astro-courier/enemy-director-worker test

      - name: Typecheck Worker
        run: corepack pnpm --filter @astro-courier/enemy-director-worker typecheck

      - name: Deploy Worker
        run: corepack pnpm dlx wrangler deploy --config apps/enemy-director-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
