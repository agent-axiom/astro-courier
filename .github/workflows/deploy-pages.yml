name: Deploy Astro Courier to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Test
        run: corepack pnpm -r test

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Build game
        run: corepack pnpm --filter @astro-courier/game-web build
        env:
          DEPLOY_BASE: /astro-courier/
          VITE_ENEMY_DIRECTOR_URL: ${{ vars.VITE_ENEMY_DIRECTOR_URL }}
          VITE_PROFILE_API_URL: ${{ vars.VITE_PROFILE_API_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/game-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
